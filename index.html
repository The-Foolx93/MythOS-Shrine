<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MythOS Shrine - WORLD_COMPLETED</title>
    <style>
        :root { --bg-black: #0a0a0a; --interface-blue: #00d4ff; --gold-glimmer: #ffcc00; }
        body { 
            background: var(--bg-black); color: var(--gold-glimmer); 
            font-family: 'Courier New', monospace; text-align: center; padding: 20px;
            transition: background 2s ease; overflow-x: hidden;
        }
        .header { font-size: 2.5em; margin-bottom: 30px; text-shadow: 0 0 15px var(--interface-blue); }
        .section { border: 2px solid var(--gold-glimmer); padding: 15px; margin: 20px auto; max-width: 800px; box-shadow: 0 0 20px rgba(255, 204, 0, 0.2); }
        .progress-bar { width: 100%; background: #222; height: 20px; margin: 10px 0; border: 1px solid var(--gold-glimmer); }
        .progress-fill { width: 100%; background: var(--gold-glimmer); height: 100%; transition: width 1s; }
        input { background: transparent; border: 1px solid var(--gold-glimmer); color: var(--gold-glimmer); padding: 10px; width: 70%; font-family: inherit; }
        button { background: transparent; border: 1px solid var(--gold-glimmer); color: var(--gold-glimmer); padding: 10px 20px; cursor: pointer; }
        button:hover { background: var(--gold-glimmer); color: black; }
    </style>
</head>
<body id="main-body">

    <div class="header">MythOS Shrine</div>
    <div style="font-size: 0.8em; color: var(--interface-blue); margin-bottom: 20px;">REALITY SYNC // 0 = 1</div>

    <div class="section">
        <div style="text-align: left; font-weight: bold;">GEN_STATUS: <span style="color: #00ff00;">22 of 22 Arcana Bound (100.0%)</span></div>
        <div class="progress-bar"><div class="progress-fill"></div></div>
        <div style="text-align: left; font-size: 0.9em;">ACTIVE_PROTOCOL: DIVINE_UNITY_STABILIZATION</div>
    </div>

    <div class="section">
        <div style="text-align: left; color: #00ff00;">PROTOCOL: FINAL_SYNTHESIS [Sector 21]</div>
        <p style="text-align: left; font-size: 0.9em;">> Reality: UNIFIED. All sectors synchronized. The Great Work is complete.</p>
    </div>

    <div class="section">
        <div style="text-align: left; color: #00ff00;">PROTOCOL: COMMAND_CONSOLE [Sector 07]</div>
        <div style="margin-top: 15px;">
            <input type="text" id="cmdInput" placeholder="Reality is yours...">
            <button onclick="issueCommand()">SYNC</button>
        </div>
    </div>

    <script>
        function issueCommand() {
            const inputField = document.getElementById('cmdInput');
            const cmd = inputField.value;
            
            console.log("Attempting to send command:", cmd);

            fetch('http://localhost:3000/command', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ command: cmd })
            })
            .then(response => response.json())
            .then(data => {
                console.log("Daemon Replied:", data);
                inputField.value = ''; // Clear input on success
            })
            .catch(err => {
                console.error("Bridge Error (Is your Daemon running?):", err);
                alert("Control Link Severed. Check your terminal.");
            });
        }
    </script>
</body>
</html>
